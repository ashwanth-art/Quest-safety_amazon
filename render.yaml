services:
  - type: web
    name: questsafety-spapi-test
    runtime: python
    rootDir: questsafety-spapi-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: USE_AMAZON_SANDBOX_API
        value: "false"
